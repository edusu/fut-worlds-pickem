# Local infra dependencies — Postgres, NATS (JetStream), and Jaeger.
# This is the canonical "what you need to bring up" file: start it with
# `just dev-up`, then run the Rust services and the Mini App on the host
# (`just bot|api|events|front`). For an all-in-container variant (services +
# Mini App included), see the sibling `docker-compose.full.yml`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: fwp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pickem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pickem}
      POSTGRES_DB: ${POSTGRES_DB:-pickem}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pickem} -d ${POSTGRES_DB:-pickem}"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    container_name: fwp-nats
    restart: unless-stopped
    # -js enables JetStream (durable streams + consumers).
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    volumes:
      - nats-data:/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: fwp-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # pgAdmin auto-connected to the Postgres above. Open http://localhost:5055
  # and the UI loads straight to the server tree — no login. The connection
  # to Postgres still prompts for the password (`pickem`) the first time you
  # expand it; tick "Save password" and pgAdmin persists it in `pgadmin-data`
  # so subsequent boots are silent.
  #
  # `PGADMIN_DEFAULT_EMAIL` / `_PASSWORD` are required by the image even
  # when login is disabled — they seed the internal user record.
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fwp-pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5055:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./config/pgadmin-servers.json:/pgadmin4/servers.json:ro

volumes:
  postgres-data:
  nats-data:
  pgadmin-data:

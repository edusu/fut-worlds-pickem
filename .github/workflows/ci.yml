name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pickem
          POSTGRES_PASSWORD: pickem
          POSTGRES_DB: pickem
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pickem -d pickem"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://pickem:pickem@localhost:5432/pickem
      NATS_URL: nats://localhost:4222
      TELEGRAM_BOT_TOKEN: ci-placeholder
      FOOTBALL_API_KEY: ci-placeholder
      API_BIND_ADDR: 0.0.0.0:8080

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/miniapp

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/miniapp/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm build
